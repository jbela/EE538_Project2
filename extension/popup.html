<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lecture Summary</title>
    <style>
      body { font-family: Arial, sans-serif; width: 320px; padding: 12px; }
      textarea { width: 100%; height: 120px; }
      .row { margin: 8px 0; }
      button { padding: 8px 10px; }
      #status { color: #444; font-size: 12px; }
    </style>
  </head>
  <body>
    <h3>Lecture Summary</h3>
    <div class="row">
      <input id="file" type="file" accept="audio/*,video/*" />
    </div>
    <div class="row">
      <button id="submitBtn">Submit File</button>
      <button id="demoBtn">Run Demo Sample</button>
    </div>
    <div class="row">
      <button id="extractBtn">Extract This Page (No Recording)</button>
    </div>
    <div id="status" class="row">Idle.</div>
    <div class="row">
      <textarea id="result" placeholder="Summary output will appear here..."></textarea>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
